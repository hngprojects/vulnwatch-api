name: Build and Deploy
on:
  pull_request:
    branches: [staging, main]
    types: [closed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    if: github.event.pull_request.merged == true && github.event.repository.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ github.event.pull_request.base.ref == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build .NET API
        run: dotnet publish api-dotnet/src/Web/Web.csproj -c Release -o ./dotnet-publish

      - name: Archive .NET build
        run: tar -czf dotnet-build.tar.gz dotnet-publish

      - name: Copy .NET build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: dotnet-build.tar.gz
          target: "/tmp"

      - name: Copy Java source to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "worker-java"
          target: "/tmp"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ "${{ github.event.pull_request.base.ref }}" = "main" ]; then
              DOTNET_DIR="/var/www/backend-production/publish"
              JAVA_DIR="/var/www/backend-production/worker-java"
              API_NAME="api-production"
              WORKER_NAME="worker-production"
              API_START_SCRIPT="/var/www/backend-production/start.sh"
              API_PORT=5001
              ENV_FILE="/etc/vulnwatch/production/api.env"
              WORKER_ENV_FILE="/etc/vulnwatch/production/worker.properties"
              START_SH_SOURCE="/etc/vulnwatch/production/start.sh"
            else
              DOTNET_DIR="/var/www/backend-staging/publish"
              JAVA_DIR="/var/www/backend-staging/worker-java"
              API_NAME="api-staging"
              WORKER_NAME="worker-staging"
              API_START_SCRIPT="/var/www/backend-staging/start.sh"
              API_PORT=5000
              ENV_FILE="/etc/vulnwatch/staging/api.env"
              WORKER_ENV_FILE="/etc/vulnwatch/staging/worker.properties"
              START_SH_SOURCE="/etc/vulnwatch/staging/start.sh"
            fi

            DOTNET_BACKUP="${DOTNET_DIR}-backup"
            JAVA_BACKUP="${JAVA_DIR}-backup"

            # ── Backup current .NET version ───────────────────────────────
            if [ -d "$DOTNET_DIR" ] && [ "$(ls -A $DOTNET_DIR)" ]; then
              echo "Backing up current .NET API..."
              rm -rf "$DOTNET_BACKUP"
              cp -r "$DOTNET_DIR" "$DOTNET_BACKUP"
            else
              echo "No existing .NET deployment found. Fresh deploy, no backup created."
            fi

            # ── Backup current Java worker ────────────────────────────────
            if [ -d "$JAVA_DIR" ] && [ "$(ls -A $JAVA_DIR)" ]; then
              echo "Backing up current Java worker..."
              rm -rf "$JAVA_BACKUP"
              cp -r "$JAVA_DIR" "$JAVA_BACKUP"
            else
              echo "No existing Java deployment found. Fresh deploy, no backup created."
            fi

            # ── Stop existing PM2 processes + flush logs ──────────────────
            pm2 delete $API_NAME || true
            pm2 delete $WORKER_NAME || true
            pm2 flush $API_NAME || true
            pm2 flush $WORKER_NAME || true

            # ── Deploy .NET API ───────────────────────────────────────────
            rm -rf "$DOTNET_DIR"
            mkdir -p "$DOTNET_DIR"

            tar -xzf /tmp/dotnet-build.tar.gz -C /tmp
            cp -r /tmp/dotnet-publish/* "$DOTNET_DIR/"
            rm -rf /tmp/dotnet-build.tar.gz /tmp/dotnet-publish

            # Re-link persistent start.sh from /etc/vulnwatch
            if [ -f "$START_SH_SOURCE" ]; then
              echo "Linking start.sh from $START_SH_SOURCE..."
              ln -sf "$START_SH_SOURCE" "$API_START_SCRIPT"
            else
              echo "ERROR: $START_SH_SOURCE not found. Cannot start .NET API."
              exit 1
            fi

            # Re-link persistent .env so the API picks up real credentials
            if [ -f "$ENV_FILE" ]; then
              echo "Linking .env from $ENV_FILE..."
              ln -sf "$ENV_FILE" "$(dirname $API_START_SCRIPT)/.env"
            else
              echo "WARNING: $ENV_FILE not found. API may fail to start."
            fi

            # ── Build Java worker on server with real properties ──────────
            rm -rf "$JAVA_DIR"
            mkdir -p "$JAVA_DIR"

            cp -r /tmp/worker-java/* "$JAVA_DIR/"
            rm -rf /tmp/worker-java

            # Re-link persistent application.properties before building
            if [ -f "$WORKER_ENV_FILE" ]; then
              echo "Linking application.properties from $WORKER_ENV_FILE..."
              rm -f "$JAVA_DIR/src/main/resources/application.properties"
              ln -sf "$WORKER_ENV_FILE" "$JAVA_DIR/src/main/resources/application.properties"
            else
              echo "WARNING: $WORKER_ENV_FILE not found. Worker may fail to start."
            fi

            # Build the JAR on the server so real properties are baked in
            echo "Building Java worker on server..."
            cd "$JAVA_DIR"
            ./mvnw package -q -DskipTests
            cd -

            # Verify JAR was built
            JAR_FILE=$(ls $JAVA_DIR/target/*.jar 2>/dev/null | grep -v sources | head -1)
            if [ -z "$JAR_FILE" ]; then
              echo "ERROR: No JAR file found in $JAVA_DIR/target"
              exit 1
            fi
            echo "JAR built successfully: $JAR_FILE"

            if [ ! -f "$WORKER_START_SCRIPT" ]; then
              echo "ERROR: worker start.sh not found at $WORKER_START_SCRIPT"
              exit 1
            fi

            # ── Start services with PM2 ───────────────────────────────────
            pm2 start "$API_START_SCRIPT" --name "$API_NAME" --cwd "$(dirname $API_START_SCRIPT)"
            pm2 save

            pm2 start "$WORKER_START_SCRIPT" --name "$WORKER_NAME" --cwd "$JAVA_DIR"
            pm2 save

            # ── Health check for .NET API ─────────────────────────────────
            echo "Running health check for .NET API..."
            API_HEALTHY=false
            for i in 1 2 3 4 5; do
              sleep 3
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$API_PORT/health)
              if [ "$STATUS" = "200" ]; then
                API_HEALTHY=true
                echo ".NET API health check passed on attempt $i (HTTP $STATUS)"
                break
              else
                echo "Attempt $i: HTTP $STATUS, retrying..."
              fi
            done

            if [ "$API_HEALTHY" = "false" ]; then
              echo "Health check failed. Rolling back..."

              pm2 delete $API_NAME || true
              pm2 delete $WORKER_NAME || true

              # Rollback .NET API
              if [ -d "$DOTNET_BACKUP" ] && [ "$(ls -A $DOTNET_BACKUP)" ]; then
                echo "Rolling back .NET API..."
                rm -rf "$DOTNET_DIR"
                cp -r "$DOTNET_BACKUP" "$DOTNET_DIR"

                # Re-link start.sh and .env after rollback
                ln -sf "$START_SH_SOURCE" "$API_START_SCRIPT"
                if [ -f "$ENV_FILE" ]; then
                  ln -sf "$ENV_FILE" "$(dirname $API_START_SCRIPT)/.env"
                fi

                pm2 start "$API_START_SCRIPT" --name "$API_NAME" --cwd "$(dirname $API_START_SCRIPT)"
                pm2 save
                rm -rf "$DOTNET_BACKUP"
                echo ".NET API rollback successful."
              else
                echo "No .NET backup available. API is down."
              fi

              # Rollback Java worker
              if [ -d "$JAVA_BACKUP" ] && [ "$(ls -A $JAVA_BACKUP)" ]; then
                echo "Rolling back Java worker..."
                rm -rf "$JAVA_DIR"
                cp -r "$JAVA_BACKUP" "$JAVA_DIR"

                # Re-link worker env after rollback
                if [ -f "$WORKER_ENV_FILE" ]; then
                  rm -f "$JAVA_DIR/src/main/resources/application.properties"
                  ln -sf "$WORKER_ENV_FILE" "$JAVA_DIR/src/main/resources/application.properties"
                fi

                pm2 start "$WORKER_START_SCRIPT" --name "$WORKER_NAME" --cwd "$JAVA_DIR"
                pm2 save
                rm -rf "$JAVA_BACKUP"
                echo "Java worker rollback successful."
              else
                echo "No Java backup available. Worker is down."
              fi

              exit 1
            fi

            # ── Cleanup backups after successful deploy ───────────────────
            if [ -d "$DOTNET_BACKUP" ]; then
              echo "Cleaning up .NET backup..."
              rm -rf "$DOTNET_BACKUP"
            fi

            if [ -d "$JAVA_BACKUP" ]; then
              echo "Cleaning up Java backup..."
              rm -rf "$JAVA_BACKUP"
            fi

            pm2 list
