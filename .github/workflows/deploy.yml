name: Build and Deploy
on:
  pull_request:
    branches: [staging, main]
    types: [closed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    if: github.event.pull_request.merged == true && github.event.repository.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ github.event.pull_request.base.ref == 'main' && 'production' || 'staging' }}
    env:
      HOST: ${{ secrets.HOST }}
      USERNAME: ${{ secrets.USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ "${{ github.event.pull_request.base.ref }}" = "main" ]; then
              DEPLOY_DIR="/var/www/backend-production"
              API_NAME="api-production"
              WORKER_NAME="worker-production"
              BRANCH="main"
              API_PORT=5001
              START_SH="/etc/vulnwatch/production/start.sh"
              API_ENV="/etc/vulnwatch/production/api.env"
              WORKER_ENV="/etc/vulnwatch/production/worker.properties"
            else
              DEPLOY_DIR="/var/www/backend-staging"
              API_NAME="api-staging"
              WORKER_NAME="worker-staging"
              BRANCH="staging"
              API_PORT=5000
              START_SH="/etc/vulnwatch/staging/start.sh"
              API_ENV="/etc/vulnwatch/staging/api.env"
              WORKER_ENV="/etc/vulnwatch/staging/worker.properties"
            fi

            PUBLISH_DIR="$DEPLOY_DIR/publish"
            JAR_DIR="$DEPLOY_DIR/worker-java/target"
            PUBLISH_BACKUP="${PUBLISH_DIR}-backup"
            JAR_BACKUP="${JAR_DIR}-backup"

            # ── Backup current .NET publish output ────────────────────────
            if [ -d "$PUBLISH_DIR" ] && [ "$(ls -A $PUBLISH_DIR)" ]; then
              echo "Backing up current .NET publish..."
              rm -rf "$PUBLISH_BACKUP"
              cp -r "$PUBLISH_DIR" "$PUBLISH_BACKUP"
            else
              echo "No existing .NET publish found. Fresh deploy, no backup created."
            fi

            # ── Backup current Java JAR ───────────────────────────────────
            if [ -d "$JAR_DIR" ] && [ "$(ls -A $JAR_DIR)" ]; then
              echo "Backing up current Java JAR..."
              rm -rf "$JAR_BACKUP"
              cp -r "$JAR_DIR" "$JAR_BACKUP"
            else
              echo "No existing Java JAR found. Fresh deploy, no backup created."
            fi

            # ── Pull latest code ──────────────────────────────────────────
            echo "Pulling latest code from $BRANCH..."
            cd "$DEPLOY_DIR"
            git reset --hard HEAD
            git pull origin "$BRANCH"

            # ── Symlink env files and start script ────────────────────────
            echo "Linking start.sh..."
            ln -sf "$START_SH" "$DEPLOY_DIR/start.sh"

            echo "Linking api .env..."
            ln -sf "$API_ENV" "$DEPLOY_DIR/.env"

            echo "Linking worker application.properties..."
            ln -sfn "$WORKER_ENV" "$DEPLOY_DIR/worker-java/src/main/resources/application.properties"

            # ── Build .NET API ────────────────────────────────────────────
            echo "Building .NET API..."
            if ! dotnet publish "$DEPLOY_DIR/api-dotnet/src/Web" -c Release -o "$PUBLISH_DIR"; then
              echo ".NET build failed. Rolling back..."

              if [ -d "$PUBLISH_BACKUP" ] && [ "$(ls -A $PUBLISH_BACKUP)" ]; then
                rm -rf "$PUBLISH_DIR"
                cp -r "$PUBLISH_BACKUP" "$PUBLISH_DIR"
              fi

              if [ -d "$JAR_BACKUP" ] && [ "$(ls -A $JAR_BACKUP)" ]; then
                rm -rf "$JAR_DIR"
                cp -r "$JAR_BACKUP" "$JAR_DIR"
              fi

              # Restart with old versions
              pm2 delete $API_NAME || true
              pm2 delete $WORKER_NAME || true
              pm2 start "$DEPLOY_DIR/start.sh" -f --name "$API_NAME" --cwd "$DEPLOY_DIR"
              pm2 start "java --enable-preview -jar $JAR_DIR/*.jar" --name "$WORKER_NAME"
              pm2 save
              rm -rf "$PUBLISH_BACKUP" "$JAR_BACKUP"
              echo "Rollback successful."
              exit 1
            fi

            # ── Build Java worker ─────────────────────────────────────────
            echo "Building Java worker..."
            if ! (cd "$DEPLOY_DIR/worker-java" && ./mvnw clean package -DskipTests); then
              echo "Java build failed. Rolling back..."

              if [ -d "$PUBLISH_BACKUP" ] && [ "$(ls -A $PUBLISH_BACKUP)" ]; then
                rm -rf "$PUBLISH_DIR"
                cp -r "$PUBLISH_BACKUP" "$PUBLISH_DIR"
              fi

              if [ -d "$JAR_BACKUP" ] && [ "$(ls -A $JAR_BACKUP)" ]; then
                rm -rf "$JAR_DIR"
                cp -r "$JAR_BACKUP" "$JAR_DIR"
              fi

              pm2 delete $API_NAME || true
              pm2 delete $WORKER_NAME || true
              pm2 start "$DEPLOY_DIR/start.sh" -f --name "$API_NAME" --cwd "$DEPLOY_DIR"
              pm2 start "java --enable-preview -jar $JAR_DIR/*.jar" --name "$WORKER_NAME"
              pm2 save
              rm -rf "$PUBLISH_BACKUP" "$JAR_BACKUP"
              echo "Rollback successful."
              exit 1
            fi

            # ── Stop existing PM2 processes ───────────────────────────────
            echo "Stopping existing PM2 processes..."
            pm2 delete $API_NAME || true
            pm2 delete $WORKER_NAME || true
            pm2 flush $API_NAME || true
            pm2 flush $WORKER_NAME || true

            # ── Start .NET API ────────────────────────────────────────────
            echo "Starting $API_NAME..."
            pm2 start "$DEPLOY_DIR/start.sh" -f --name "$API_NAME" --cwd "$DEPLOY_DIR"

            # ── Start Java worker ─────────────────────────────────────────
            echo "Starting $WORKER_NAME..."
            pm2 start "java --enable-preview -jar $DEPLOY_DIR/worker-java/target/*.jar" --name "$WORKER_NAME"

            # ── Health check ──────────────────────────────────────────────
            echo "Running health check..."
            HEALTHY=false
            for i in 1 2 3 4 5; do
              sleep 3
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$API_PORT/health)
              if [ "$STATUS" = "200" ]; then
                HEALTHY=true
                echo "Health check passed on attempt $i (HTTP $STATUS)"
                break
              else
                echo "Attempt $i: HTTP $STATUS, retrying..."
              fi
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "Health check failed. Rolling back..."

              pm2 delete $API_NAME || true
              pm2 delete $WORKER_NAME || true

              if [ -d "$PUBLISH_BACKUP" ] && [ "$(ls -A $PUBLISH_BACKUP)" ]; then
                echo "Rolling back .NET API..."
                rm -rf "$PUBLISH_DIR"
                cp -r "$PUBLISH_BACKUP" "$PUBLISH_DIR"
              fi

              if [ -d "$JAR_BACKUP" ] && [ "$(ls -A $JAR_BACKUP)" ]; then
                echo "Rolling back Java worker..."
                rm -rf "$JAR_DIR"
                cp -r "$JAR_BACKUP" "$JAR_DIR"
              fi

              pm2 start "$DEPLOY_DIR/start.sh" -f --name "$API_NAME" --cwd "$DEPLOY_DIR"
              pm2 start "java --enable-preview -jar $JAR_DIR/*.jar" --name "$WORKER_NAME"
              pm2 save
              rm -rf "$PUBLISH_BACKUP" "$JAR_BACKUP"
              echo "Rollback successful. Services are running on previous version."
              exit 1
            fi

            # ── Cleanup backups after successful deploy ───────────────────
            if [ -d "$PUBLISH_BACKUP" ]; then
              echo "Cleaning up .NET backup..."
              rm -rf "$PUBLISH_BACKUP"
            fi

            if [ -d "$JAR_BACKUP" ]; then
              echo "Cleaning up Java backup..."
              rm -rf "$JAR_BACKUP"
            fi

            echo "Deploy successful!"
            pm2 save
            pm2 list
