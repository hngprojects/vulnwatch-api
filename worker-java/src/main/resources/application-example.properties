# ===================================================================
# DATABASE CONFIGURATION
# ===================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vulnwatchdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}

# ===================================================================
# CACHING & QUEUE
# ===================================================================
redis.host=${REDIS_HOST:localhost}
redis.port=${REDIS_PORT:6379}
redis.password=${REDIS_PASSWORD:}
redis.ssl=${REDIS_SSL:false}

worker.domain.result.queue=${WORKER_DOMAIN_RESULT_QUEUE:domain-intel}

# ===================================================================
# THIRD-PARTY INTEGRATIONS
# ===================================================================
github.token=${GITHUB_TOKEN:poiuytrewertyuio}

# ===================================================================
# AI PROVIDER SETTINGS
# ===================================================================
# Set provider to: groq, anthropic, or google
worker.ai.provider=${AI_PROVIDER:groq}

# 1. GROQ (OpenAI Compatible)
spring.ai.openai.api-key=${GROQ_API_KEY:}
spring.ai.openai.chat.options.model=${GROQ_MODEL:llama-3.3-70b-versatile}
spring.ai.openai.chat.options.max-tokens=800
spring.ai.openai.chat.enabled=${AI_PROVIDER_IS_GROQ:true}

# 2. ANTHROPIC (Claude)
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.chat.options.model=${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
spring.ai.anthropic.chat.options.max-tokens=800
spring.ai.anthropic.chat.enabled=${AI_PROVIDER_IS_ANTHROPIC:false}

# 3. GOOGLE GEMINI (GenAI)
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=${GEMINI_MODEL:gemini-2.0-flash}
spring.ai.google.genai.chat.enabled=${AI_PROVIDER_IS_GEMINI:false}