# ==============================================================================
# 1. APPLICATION BOOTSTRAP & SUB-SYSTEM OVERRIDES
# ==============================================================================
# Tell Spring Boot this is a headless consumer application (avoids booting Tomcat/Netty)
spring.main.web-application-type=none

# Explicitly disable web-facing autoconfiguration infrastructure beans
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.web.reactive.ReactiveWebServerFactoryAutoConfiguration,\
  org.springframework.boot.autoconfigure.web.reactive.ReactiveWebAutoConfiguration


# ==============================================================================
# 2. DATA INFRASTRUCTURE CONFIGURATIONS
# ==============================================================================
# Core Relational Storage Layer (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vulnwatchdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}

# Core Cache & Operational Message Broker (Redis Client Instance)
redis.host=${REDIS_HOST:localhost}
redis.port=${REDIS_PORT:6379}
redis.password=${REDIS_PASSWORD:}
redis.ssl=${REDIS_SSL:false}


# ==============================================================================
# 3. VULNWATCH SYSTEM CORE WORKER PROPERTIES
# ==============================================================================
# Inbound / Outbound Worker Pipelines
worker.scanjob.queue=${WORKER_SCANJOB_QUEUE:scan-jobs}
worker.domain.result.queue=${WORKER_DOMAIN_RESULT_QUEUE:scan-results}

# Dead-Letter Infrastructure Fault Isolation
worker.dlq.key=${WORKER_DLQ_KEY:dead-letter}
worker.surface.dlq.key=${WORKER_SURFACE_DLQ_KEY:surface-dead-letter}

# Polling Realtime Engine Constraints
worker.blpop.timeout=${WORKER_BLPOP_TIMEOUT:5}

# Transient Redis Engine State Lifecycles (Default: 24 Hours)
worker.state.ttl-seconds=${WORKER_STATE_TTL_SECONDS:86400}


# ==============================================================================
# 4. THIRD-PARTY DATA SOURCE INTEGRATIONS
# ==============================================================================
# GitHub REST and GraphQL API Authentication Gateway token
github.token=${GITHUB_TOKEN:poiuytrewertyuio}


# ==============================================================================
# 5. CORE AI ENGINE & PROVIDER SWITCHES
# ==============================================================================
# Router property targeting active client subsystem bean: [groq, anthropic, google]
worker.ai.provider=${AI_PROVIDER:groq}

# ------------------------------------------------------------------------------
# 5.1 GROQ (OpenAI Compatible Architecture)
# ------------------------------------------------------------------------------
spring.ai.openai.base-url=${GROQ_BASE_URL:https://api.groq.com/openai}
spring.ai.openai.api-key=${GROQ_API_KEY:mock-key-placeholder-value}
spring.ai.openai.chat.options.model=${GROQ_MODEL:llama-3.3-70b-versatile}
spring.ai.openai.chat.options.max-tokens=800

# ------------------------------------------------------------------------------
# 5.2 ANTHROPIC (Claude Core Engines)
# ------------------------------------------------------------------------------
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:mock-key-placeholder-value}
spring.ai.anthropic.chat.options.model=${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
spring.ai.anthropic.chat.options.max-tokens=800

# ------------------------------------------------------------------------------
# 5.3 GOOGLE GEMINI (GenAI Core Models)
# ------------------------------------------------------------------------------
spring.ai.google.genai.api-key=${GEMINI_API_KEY:mock-key-placeholder-value}
spring.ai.google.genai.chat.options.model=${GEMINI_MODEL:gemini-2.0-flash}


# ==============================================================================
# 6. ENRICHMENT RESILIENCE & CIRCUIT BREAKER CONTROLS
# ==============================================================================
# Number of consecutive tasks inspected in sliding statistics analysis windows
worker.ai.cb.sliding-window-size=10

# Percentage ratio of dropped errors needed to shift state to OPEN (e.g. 5 failures out of 10)
worker.ai.cb.failure-rate-threshold=50.0

# Timeout constraint before an OPEN gateway auto-transitions into HALF_OPEN state
worker.ai.cb.wait-duration-seconds=30

# Max sequential pipeline test iterations allocated during verification cycles
worker.ai.cb.half-open-calls=3